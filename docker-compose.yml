version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: nouchka/sqlite3:latest   
    volumes:
      - sqlite-data:/data
    working_dir: /data
    command: ["sqlite3", "appointments.db"]

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
      - backend
    command: celery -A scheduler.campaigns worker --loglevel=info

  frontend:   
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules   
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=http://backend:8000

volumes:
  sqlite-data: